spring.application.name = SportradarTask


# ready url
#http://localhost:8080/h2-console/

spring.datasource.url = jdbc:h2:file:~;DB_CLOSE_ON_EXIT=TRUE
spring.datasource.driverClassName = org.h2.Driver
spring.datasource.username = sa
spring.datasource.password = password


spring.jpa.database-platform = org.hibernate.dialect.H2Dialect

spring.h2.console.enabled = true

# depending on your needs you can create the whole database every time the app starts (create), or keep it (update)

#spring.jpa.hibernate.ddl-auto = create
spring.jpa.hibernate.ddl-auto = update


